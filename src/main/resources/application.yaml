server:
  port: 8081

spring:
  application:
    name: ai-coding-study
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yu_ai_code_mother

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.zlj.aicodingstudy.controller

# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

# AI 公共配置。API Key 由 local Profile 下 config/application-local.yaml 导入的 .env 提供。
langchain4j:
  community:
    redis:
      enabled: false
  open-ai:
    chat-model:
      base-url: https://vip.j3gb.com/v1
      api-key: ${OPENAI_API_KEY}
      model-name: gpt-5.6-terra
      max-tokens: 81920
      log-requests: false
      log-responses: false
    streaming-chat-model:
      base-url: https://vip.j3gb.com/v1
      api-key: ${OPENAI_API_KEY}
      model-name: gpt-5.6-terra
      max-tokens: 81920
      log-requests: false
      log-responses: false
