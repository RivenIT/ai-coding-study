server:
  port: 8081

spring:
  application:
    name: ai-coding-study
    # mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/yu_ai_code_mother
    username: root
    password: 123456

# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.zlj.aicodingstudy.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn

